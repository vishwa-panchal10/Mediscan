<!DOCTYPE html>
<html>
<head>

<title>MEDISCAN Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(120deg,#020c1b,#031b3b);
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:95%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-family:Orbitron;
font-size:22px;
color:#00f5ff;
}

.home-btn{
padding:8px 16px;
background:#19e3c8;
border-radius:20px;
color:black;
text-decoration:none;
font-weight:600;
}

/* PAGE CENTER */

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN CARD */

.login-card{

width:380px;

padding:45px;

background:rgba(255,255,255,0.04);

border-radius:18px;

box-shadow:0 0 40px rgba(0,255,255,0.15);

text-align:center;

}

.login-card h2{

font-family:Orbitron;

color:#00f5ff;

margin-bottom:25px;

}

input{

width:100%;

padding:12px;

margin-bottom:15px;

border:none;

border-radius:10px;

background:#d1d5db;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:25px;

background:linear-gradient(90deg,#00f5ff,#00ffcc);

font-weight:600;

cursor:pointer;

}


</style>

</head>

<body>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">MEDISCAN ADMIN</div>
    <a href="/" class="home-btn">Home</a>
</div>

<!-- LOGIN SECTION -->
<div class="page">

    <div class="login-card">

        <h2>Admin Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Admin ID" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        {% if error %}
        <p class="error">{{error}}</p>
        {% endif %}

    </div>

</div>

</body>

</html>
