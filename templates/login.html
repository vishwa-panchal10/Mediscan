<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediScan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f1c;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 50px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            height: 50px;
            margin-bottom: 20px;
        }

        .auth-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #00f5ff, #00ffcc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            color: #94a3b8;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #00f5ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #00f5ff, #00ffcc);
            color: #0a0f1c;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 245, 255, 0.3);
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
        }

        .auth-link {
            color: #00f5ff;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Consistent Sequential Branding -->
    <header class="navbar" style="position: absolute; top: 20px;">
        <div class="nav-main-glass" style="height: 60px; padding: 0 20px; flex: 0 1 auto; min-width: 250px;">
            <div class="logo">
                <img src="/static/image/logo.png" alt="MediScan Logo" class="logo-img" style="height:25px;">
                <span class="logo-highlight" style="font-size: 20px;">MEDISCAN</span>
            </div>
            <div class="nav-right" style="margin-left: 15px;">
                <a href="/" class="logout-btn"
                    style="color: #94a3b8 !important; border: 1px solid rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 11px;">Back
                    to Home</a>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/static/image/mediscan-logo.png" alt="MediScan Logo" class="auth-logo"
                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063067.png'">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to access your MediScan dashboard</p>
            </div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    <div style="text-align: right; margin-top: 8px;">
                        <a href="javascript:void(0)" onclick="forgotPassword()" class="auth-link"
                            style="font-size: 13px;">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
                <div style="margin-top: 15px;">
                    <a href="/guest" class="auth-btn" style="display: block; text-align: center; background: rgba(255, 255, 255, 0.05); color: #00f5ff; border: 1px solid rgba(0, 245, 255, 0.2); text-decoration: none;">Continue as Guest</a>
                </div>
            </form>

            <div class="auth-footer">
                Only Admin can login. Others can use Guest mode.
            </div>
        </div>
    </div>

    <script>
        function forgotPassword() {
            const email = prompt("Please enter your registered email address:");
            if (email) {
                // Call the backend endpoint
                fetch('/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email }),
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.message) {
                            alert(data.message);
                        } else {
                            alert("Error: " + (data.error || "Something went wrong"));
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("Failed to process request. Please try again later.");
                    });
            }
        }
    </script>
</body>

</html>
